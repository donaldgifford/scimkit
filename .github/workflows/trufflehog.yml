---
# $schema=https://www.schemastore.org/github-action.json
name: Secret Scan
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret Scanning
        # renovate: datasource=github-releases depName=trufflesecurity/trufflehog
        uses: trufflesecurity/trufflehog@v3.95.8
        with:
          extra_args: --results=verified,unknown
