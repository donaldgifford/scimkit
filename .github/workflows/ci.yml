---
# $schema=https://www.schemastore.org/github-action.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  labeler:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Label PR
    steps:
      - name: Label PR
        uses: actions/labeler@v6
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up mise (for just)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Run unit tests
        run: just test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: donaldgifford/scimkit
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        uses: donaldgifford/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Build snapshot release with SBOMs
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish --skip=sign --clean

      - name: Locate archive SBOM
        id: sbom-path
        run: echo "path=$(ls dist/scimkit_*_linux_amd64.tar.gz.spdx.json)" >> "$GITHUB_OUTPUT"

      - name: Scan archive SBOM
        id: scan-sbom
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ steps.sbom-path.outputs.path }}
          severity-cutoff: high
          fail-build: false
          output-format: sarif

      - name: Upload SBOM scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: ${{ steps.scan-sbom.outputs.sarif }}
          category: anchore-archive-sbom
